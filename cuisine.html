    <style>



        #popupInfoWindow::-webkit-scrollbar {

            width: 7px;
        }
        #popupInfoWindow::-webkit-scrollbar-track {
            background: gainsboro;
            border-radius: 5px;
        }
        #popupInfoWindow::-webkit-scrollbar-thumb {
            background: black;
            border-radius: 5px;
        }

        #popupInfoWindow::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
           
       

         #popupInfoWindow{
            transition: .3s;
            scale:0;
            position: fixed;
            background-color: white;
            height: fit-content;
            left:25%;
            top:25%;
            bottom:25%;
            right: 25%;
            max-height: 200px;
            transform: translate(-25%, -25%, 25%, 25%);
            overflow-y:auto;
 
            z-index: 11;
            padding: 20px 20px;
            padding-bottom:10px;
            border-radius: 10px;
        }

        .overlay{
            display: none;
            position: fixed;
            top:0;
            bottom:0;
            right: 0;
            left: 0;
            z-index: 10;
            background-color: rgba(0,0,0,.5);
        }
        
        #popupInfoWindow h3{
            margin: 0;
            
        }

        #popupInfoWindow ul{
            list-style-type:disc;
        }

        #popupInfoWindow button{
            width: 100%;
            font-size: 15px;
            cursor: pointer;
            border:none;
            line-height: 24px;
            background-color: rgb(221, 221, 221);
            transition: background-color .2s
        }

        #popupInfoWindow button:hover{
            background-color: rgb(195, 192, 192);
        }

       
        .popupTweenIn{
                transition:.3s;
                scale:1 !important;
        }

       
    </style>
</head>
